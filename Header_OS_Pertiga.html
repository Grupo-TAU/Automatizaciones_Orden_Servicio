  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {

    font-size: 12px;
  }

    position: relative;
    width: 100%;

  }

    width: 100%;

    background-color: rgb(50, 84, 35);

    padding: 0 18px;

    text-align: right;
    padding-right: 16px;
  }

    height: 42px;
    width: auto;
    max-width: 120px;
    display: inline-block;
    vertical-align: middle;
  }
  .header-table td.pertiga-cell {
    width: 60px;
    text-align: right;
    padding-right: 10px;
  }
  .header-table td.pertiga-cell img {
    height: 42px;
    width: auto;
    display: inline-block;
    vertical-align: middle;
  }
  .header-title {
    font-family: 'Barlow Condensed', Arial Narrow, sans-serif;
    font-weight: 700;
    font-size: 24px;
    letter-spacing: .04em;
    text-transform: uppercase;
    line-height: 1.2;
    color: #ffffff;
  }
  .header-title span {
    font-weight: 400;
    font-size: 21px;
    letter-spacing: .06em;
    opacity: .75;
    display: block;
  }
